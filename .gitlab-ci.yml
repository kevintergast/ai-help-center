# HallofHelp — GitLab CI/CD für Next.js (OpenNext) auf Cloudflare Workers/D1
# Strategie-Doku: docs/git-strategy.md
default:
  image: node:22-slim
  cache:
    key:
      files: [pnpm-lock.yaml]
    paths: [.pnpm-store/]
  before_script:
    - corepack enable
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile

stages: [validate, test, build, migrate, deploy]

# Nur MR-Events und Pushes auf develop/main — keine Doppel-Pipelines.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: never

lint:
  stage: validate
  script: [pnpm run lint]

typecheck:
  stage: validate
  script: [pnpm run typecheck]

i18n:
  stage: validate
  script: [pnpm run i18n:check]

unit-test:
  stage: test
  script: [pnpm run test]

build:
  stage: build
  script: [pnpm exec opennextjs-cloudflare build]
  artifacts:
    paths: [.open-next/]
    expire_in: 1 day

# ---------- STAGING (auto bei Merge nach develop) ----------
migrate:staging:
  stage: migrate
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - pnpm exec wrangler d1 migrations apply hallofhelp-staging --remote

deploy:staging:
  stage: deploy
  needs: [build, migrate:staging]
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
  environment:
    name: staging
    url: https://staging.hallofhelp.app
  script:
    - pnpm exec wrangler deploy

# ---------- PRODUCTION (nur main, manuelles Gate) ----------
migrate:production:
  stage: migrate
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  allow_failure: false
  script:
    - pnpm exec wrangler d1 migrations apply hallofhelp-prod --env production --remote

deploy:production:
  stage: deploy
  needs: [build, migrate:production]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  allow_failure: false
  environment:
    name: production
    url: https://app.hallofhelp.app
  script:
    - pnpm exec wrangler deploy --env production
