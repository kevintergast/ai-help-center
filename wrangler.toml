# HallofHelp — Cloudflare Worker (Next.js via OpenNext)
# IDs nach dem Anlegen der Ressourcen einsetzen (siehe README / Chat).
name = "hallofhelp"
# Eigener Entry (statt direkt .open-next/worker.js): re-exportiert den
# OpenNext-Handler und ergänzt den Embedding-Queue-Consumer (worker.ts).
main = "worker.ts"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

# Von OpenNext erzeugte Next.js-Static-Assets:
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# ─── STAGING (Default-Env) ─────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "hallofhelp-staging"
database_id = "436c53cb-7157-411c-8d45-6da439c26033"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "MEDIA"                       # Artikel-Bilder/-Assets (nicht mit ASSETS = Next-Static verwechseln)
bucket_name = "hallofhelp-assets-staging"
jurisdiction = "eu"

[[vectorize]]
binding = "VECTORIZE"
index_name = "hallofhelp-articles-staging"

[[kv_namespaces]]
binding = "CACHE"
id = "179988c7d6344221b9a41da8312f2594"

[ai]
binding = "AI"

# DEV-Wildcard-Routing: alle Subdomains von dev.hallofhelp.com (app./<slug>.) auf den
# Staging-Worker → spiegelt das Prod-Self-Service-Modell eine Ebene tiefer. VORAUSSETZUNG
# vor dem naechsten Staging-Deploy (sonst schlaegt die Route-Erstellung fehl):
#   Cloudflare-DNS auf hallofhelp.com: A-Record  Name "*.dev"  Inhalt 192.0.2.0  Proxied (orange).
#   (Zone-Scope "Workers Routes: Edit" ist durchs Prod-Routing bereits am CI-Token.)
[[routes]]
pattern = "*.dev.hallofhelp.com/*"
zone_name = "hallofhelp.com"

# App-Umgebung (nur Anzeige, z. B. Env-Marker oben am Bildschirmrand).
# Staging/Dev = "development"; Prod überschreibt unten auf "production".
# APP_BASE_DOMAIN: Basis-Domain DIESES Workers für den Auth-Origin (Login/Reset-Links).
# TURNSTILE_SITE_KEY: öffentlicher Widget-Key (Bot-Schutz Signup/Reset/Tenant-
# Erstellung) — bewusst als var (kein Secret); der Hostname-Scope deckt alle
# Subdomains von hallofhelp.com ab, gilt also für Staging UND Prod.
[vars]
APP_ENV = "development"
APP_BASE_DOMAIN = "dev.hallofhelp.com"
TURNSTILE_SITE_KEY = "0x4AAAAAAD2WZHccdk7dphf_"

# AUTH_SECRET aus Cloudflare Secrets Store (Wert bleibt in Cloudflare, nie im Repo):
[[secrets_store_secrets]]
binding = "AUTH_SECRET"
store_id = "3a87edf96f654271b54858cfbc4c61fc"
secret_name = "AUTH_SECRET"

# Turnstile-Server-Secret (siteverify). Fehlt es: dev → Schutz aus, Prod →
# fail-closed auf den geschützten Endpunkten (src/server/security/turnstile.ts).
[[secrets_store_secrets]]
binding = "TURNSTILE_SECRET_KEY"
store_id = "3a87edf96f654271b54858cfbc4c61fc"
secret_name = "TURNSTILE_SECRET_KEY"

# Embedding-Queue (Workers Paid, aktiv seit 2026-07-15): Content-Änderungen →
# asynchrone (Re-)Indexierung. Producer-Binding fürs Enqueue; der Consumer
# läuft im selben Worker (worker.ts). In `next dev` wird BEWUSST der direkte
# Pfad genutzt (kein lokaler Consumer) — Weiche in runtime-deps.ts.
[[queues.producers]]
binding = "EMBED_QUEUE"
queue = "hallofhelp-embeddings-staging"

[[queues.consumers]]
queue = "hallofhelp-embeddings-staging"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 5

# ─── PRODUCTION ────────────────────────────────────────────────────
[env.production]
# Expliziter Name (sonst haengt Wrangler "-production" an) → konsistent mit DB/Bucket/Index.
name = "hallofhelp-prod"

# Wildcard-Routing: ALLE Subdomains (app./auth./<tenant-slug>.) laufen auf diesen Worker
# → Self-Service-Tenants ohne Zusatzschritt. VORAUSSETZUNGEN vor dem Prod-Deploy
# (sonst schlaegt die Route-Erstellung fehl):
#   1) Cloudflare-DNS auf hallofhelp.com: A-Record  Name "*"  Inhalt 192.0.2.0  Proxied (orange).
#   2) CI-Token braucht zusaetzlich Zone-Scope "Workers Routes: Edit".
#   3) Zone SSL/TLS-Modus = Full oder Full (strict).
[[env.production.routes]]
pattern = "*.hallofhelp.com/*"
zone_name = "hallofhelp.com"

# Cloudflare-for-SaaS-Serving (Infra-Plan Schritt 5): Kunden-Custom-Domains
# (hilfe.kunde.de → CNAME auf uns) tragen einen FREMDEN Host-Header — sie
# matchen die *.hallofhelp.com-Route NICHT. Das dokumentierte SaaS-Muster ist
# die zonenweite Route `*/*` (fängt Custom-Hostname-Traffic UND die Apex ab;
# unbekannte Hosts beantwortet die App fail-closed mit der 404-Shell).
# VORAUSSETZUNG: Fallback-Origin in der Zone (originless AAAA `saas-fallback`
# → 100::, proxied) + im Dashboard als Fallback Origin gesetzt.
[[env.production.routes]]
pattern = "*/*"
zone_name = "hallofhelp.com"

[env.production.assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[env.production.d1_databases]]
binding = "DB"
database_name = "hallofhelp-prod"
database_id = "27ee06db-0320-427a-9c90-c45c673accfc"
migrations_dir = "migrations"

[[env.production.r2_buckets]]
binding = "MEDIA"
bucket_name = "hallofhelp-assets-prod"
jurisdiction = "eu"

[[env.production.vectorize]]
binding = "VECTORIZE"
index_name = "hallofhelp-articles-prod"

[[env.production.kv_namespaces]]
binding = "CACHE"
id = "f7ba0390e26c408ea72c4cca14d33856"

[env.production.ai]
binding = "AI"

[[env.production.queues.producers]]
binding = "EMBED_QUEUE"
queue = "hallofhelp-embeddings-prod"

[[env.production.queues.consumers]]
queue = "hallofhelp-embeddings-prod"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 5

# Prod-Umgebung → Env-Marker wird ausgeblendet.
# CF_ZONE_ID: Zone hallofhelp.com — Ziel der Custom-Hostname-API (SaaS-
# Provisioning nach Domain-Verify). NUR Prod: Staging provisioniert bewusst
# nicht (Provisioner dort inert → "skipped"), Kunden-Domains sind Prod-Sache.
[env.production.vars]
APP_ENV = "production"
APP_BASE_DOMAIN = "hallofhelp.com"
TURNSTILE_SITE_KEY = "0x4AAAAAAD2WZHccdk7dphf_"
CF_ZONE_ID = "7626c7d77e1580b7a31ed5a9b1ca9cba"

# Eigener Prod-Secret (getrennt von Staging; Rotation invalidiert nur Prod-Sessions).
[[env.production.secrets_store_secrets]]
binding = "AUTH_SECRET"
store_id = "3a87edf96f654271b54858cfbc4c61fc"
secret_name = "PROD_AUTH_SECRET"

# Turnstile-Server-Secret — in Prod PFLICHT (ohne: fail-closed auf Signup/Reset/
# Tenant-Erstellung, siehe src/server/security/turnstile.ts).
[[env.production.secrets_store_secrets]]
binding = "TURNSTILE_SECRET_KEY"
store_id = "3a87edf96f654271b54858cfbc4c61fc"
secret_name = "TURNSTILE_SECRET_KEY"

# Cloudflare-for-SaaS-API-Token (scoped: Zone→SSL and Certificates:Edit) —
# legt nach Domain-Verify den Custom Hostname an (domains/provisioner.ts).
[[env.production.secrets_store_secrets]]
binding = "CF_SAAS_API_TOKEN"
store_id = "3a87edf96f654271b54858cfbc4c61fc"
secret_name = "CF_SAAS_API_TOKEN"
